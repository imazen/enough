name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Superseded runs only waste runner queue — particularly the macOS
# jobs, which wait on GitHub's scarcest pool. Only the newest
# commit's run matters per ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, 1.85]
        exclude:
          # MSRV only on Linux
          - os: windows-latest
            rust: 1.85
          - os: macos-latest
            rust: 1.85

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

      - name: Test (no default features)
        run: |
          cargo test -p enough --no-default-features
          cargo test -p almost-enough --no-default-features

      - name: Test (alloc only)
        run: |
          cargo test -p enough --no-default-features --features alloc
          cargo test -p almost-enough --no-default-features --features alloc

  cross-platform:
    name: Cross (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
          - os: macos-26-intel
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

  # ==========================================================================
  # Cross-compiled 32-bit testing (i686 via QEMU)
  # ==========================================================================
  test-i686:
    name: Test i686
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu

      - name: Install cross
        uses: taiki-e/install-action@cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686

      - name: Test (i686/QEMU)
        run: cross test --workspace --target i686-unknown-linux-gnu

  # ==========================================================================
  # no_std and WASM build verification
  # ==========================================================================
  no-std:
    name: no_std / WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf, wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Build no_std (enough)
        run: cargo build -p enough --target thumbv7em-none-eabihf --no-default-features

      - name: Build no_std (almost-enough)
        run: cargo build -p almost-enough --target thumbv7em-none-eabihf --no-default-features

      - name: Build WASM (enough)
        run: cargo build -p enough --target wasm32-unknown-unknown --no-default-features --features alloc

      - name: Build WASM (almost-enough)
        run: cargo build -p almost-enough --target wasm32-unknown-unknown --no-default-features --features alloc

  # ==========================================================================
  # Feature powerset — verify all feature combinations compile
  # ==========================================================================
  features:
    name: Feature powerset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - uses: Swatinem/rust-cache@v2

      - name: Check feature powerset
        run: cargo hack check --feature-powerset --no-dev-deps -p enough -p almost-enough

  # ==========================================================================
  # Semver — catch accidental breaking changes
  # ==========================================================================
  semver:
    name: Semver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - uses: Swatinem/rust-cache@v2

      - name: Check semver (enough)
        run: cargo semver-checks -p enough

      - name: Check semver (almost-enough)
        run: cargo semver-checks -p almost-enough

  # ==========================================================================
  # Miri — check unsafe code soundness (enough-ffi)
  # ==========================================================================
  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly + Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - uses: Swatinem/rust-cache@v2

      - name: Run Miri (enough-ffi)
        run: cargo +nightly miri test -p enough-ffi
        env:
          MIRIFLAGS: -Zmiri-strict-provenance

  # ==========================================================================
  # Dependency audit — licenses and advisories
  # ==========================================================================
  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check advisories
        run: cargo deny check advisories

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check bans
        run: cargo deny check bans

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
