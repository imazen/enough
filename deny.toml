[graph]
targets = []
all-features = true
exclude = [
    "test-basic",
    "test-atomic",
    "test-timeout",
    "test-child",
    "test-rayon",
    "test-tokio",
    "test-ffi",
    "test-codec-mock",
    "test-ergonomics",
    "test-or-do-this",
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
